site_name: Lythonic
site_description: Lightweight pythonic toolkit for building complex workflows
site_url: https://walnutgeek.github.io/lythonic/
repo_url: https://github.com/walnutgeek/lythonic
repo_name: walnutgeek/lythonic

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            docstring_style: google

markdown_extensions:
  - pycon
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - toc:
      permalink: true

not_in_nav: |
  /release_notes/v*.md
  /open-questions.md

nav:
  - Home: index.md
  - Posts:
      - "2026-04-13 Show HN": posts/2026-04-13-show-hn.md
  - Getting Started: getting-started.md
  - Tutorials:
      - Getting Started with lyth: tutorials/lyth-quickstart.md
      - Build a Pipeline: tutorials/compose-pipeline.md
      - Your First Schema: tutorials/first-schema.md
      - CRUD Operations: tutorials/crud-operations.md
      - Cashflow Tracking Example: tutorials/cashflow-example.md
      - Scheduled Triggers: tutorials/scheduled-triggers.md
  - How-To Guides:
      - Define a Schema: how-to/define-schema.md
      - Multi-Tenant Apps: how-to/multi-tenant.md
      - Composable DAGs: how-to/composable-dags.md
  - API Reference:
      - lythonic: reference/core.md
      - compose:
          - lythonic.compose: reference/compose.md
          - "...namespace": reference/compose-namespace.md
          - "...dag_runner": reference/compose-dag-runner.md
          - "...dag_provenance": reference/compose-dag-provenance.md
          - "...cached": reference/compose-cached.md
          - "...cli": reference/compose-cli.md
          - "...trigger": reference/compose-trigger.md
      - state:
          - lythonic.state: reference/state.md
          - "...user": reference/user.md
      - lythonic.types: reference/types.md
      - lythonic.periodic: reference/periodic.md
      - lythonic.misc: reference/misc.md
  - Releases:
      - v0.0.15: release_notes/v0.0.15.md
      - v0.0.14: release_notes/v0.0.14.md
      - v0.0.13: release_notes/v0.0.13.md
      - "...": release_notes/index.md
