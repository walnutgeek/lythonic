namespace:
  - nsref: "examples:task1"
    gref: "lythonic.examples.do_sleep_repeat:task1"
    triggers:
      - name: "task1_repeat"
        type: "poll"
        schedule: "*/15 * * * * *"
  - nsref: "examples:dag1"
    gref: "lythonic.examples.do_sleep_repeat:dag1__"
    triggers:
      - name: dag1_repeat
        type: "poll"
        schedule: "*/15 * * * * *"
